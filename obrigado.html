<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento confirmado · Privacy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(135deg,#fff7ed 0%,#ffedd5 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:1.5rem;
      color:#1f2937;
    }
    .card{
      background:white;
      padding:2.5rem 2rem;
      border-radius:1rem;
      box-shadow:0 10px 25px -5px rgba(0,0,0,0.1);
      text-align:center;
      max-width:420px;
      width:100%;
    }
    .icon{
      width:72px;
      height:72px;
      border-radius:50%;
      background:#dcfce7;
      color:#16a34a;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 1.25rem;
      font-size:2.25rem;
    }
    h1{
      font-size:1.5rem;
      font-weight:700;
      margin-bottom:0.5rem;
    }
    p{
      color:#4b5563;
      font-size:0.9375rem;
      margin-bottom:1rem;
      line-height:1.5;
    }
    a.cta{
      display:inline-block;
      margin-top:0.75rem;
      padding:0.75rem 1.5rem;
      background:linear-gradient(to right,#fb923c,#f97316);
      color:white;
      text-decoration:none;
      border-radius:0.5rem;
      font-weight:600;
      font-size:0.9375rem;
    }
    a.cta:hover{
      background:linear-gradient(to right,#f97316,#ea580c);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Pagamento confirmado!</h1>
    <p>Obrigado pela tua subscrição. Em breve receberás um e-mail com os detalhes do acesso.</p>
    <p style="font-size:0.8125rem;color:#9ca3af;">Se não receberes nada nos próximos minutos, verifica a pasta de spam.</p>
    <a href="/" class="cta">Voltar ao início</a>
  </div>
</body>
</html>
